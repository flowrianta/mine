name: p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -U yt-dlp
          sudo apt-get update -qq
          sudo apt-get install -y bc rar

      - name: Download video (retry up to 5 times)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"

          MAX_RETRIES=5
          SUCCESS=false
          NEW_FILE=""

          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $i/$MAX_RETRIES ---"

            # ابتدا فایل‌های موجود رو ثبت کن
            find "$FOLDER" -type f > /tmp/before_files.txtyt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 10 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --newline \
              "${{ github.event.inputs.url }}"

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              # فایل جدید = فایلی که قبلاً نبوده
              NEW_FILE=$(comm -13 \
                <(sort /tmp/before_files.txt) \
                <(find "$FOLDER" -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" \) | sort) \
                | head -1)

              if [ -n "$NEW_FILE" ] && [ -f "$NEW_FILE" ]; then
                echo "Download succeeded: $NEW_FILE"
                SUCCESS=true
                break
              fi
            fi

            echo "Attempt $i failed (exit=$EXIT_CODE)"
            [ $i -lt $MAX_RETRIES ] && sleep $((10 * i))
          done

          if [ "$SUCCESS" = false ]; then
            echo "::error::All $MAX_RETRIES download attempts failed"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "filepath=$NEW_FILE" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Split if file > 99 MB
        id: split
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > 99" | bc -l) )); then
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"
            rm "$FILENAME"

            echo "split_done=true" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"else
            echo "split_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          TAG="dl-$(date +%Y%m%d-%H%M%S)"

          gh release create "$TAG" \
            --title "📥 ${FILENAME}" \
            --notes "Source: ${{ github.event.inputs.url }}" \
            --latest

          find "$FOLDER" -type f | while read -r f; do
            gh release upload "$TAG" "$f" --clobber
          done
