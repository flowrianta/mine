name: Download Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      quality:
        description: 'Quality (e.g. bestvideo+bestaudio/best)'
        required: false
        default: 'bestvideo+bestaudio/best'
      output_folder:
        description: 'Output folder name'
        required: false
        default: 'downloads'archive_name:
        description: 'Archive name (without extension)'
        required: false
        default: 'video'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Install rar
        run: sudo apt-get install -y rar

      - name: Download video (retry up to 5 times)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"

          MAX_RETRIES=5
          SUCCESS=false
          NEW_FILE=""

          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Attempt $i/$MAX_RETRIES ---"

            find "$FOLDER" -type f > /tmp/before_files.txt

            yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 10 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --newline \
              "${{ github.event.inputs.url }}"

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              NEW_FILE=$(comm -13 \
                <(sort /tmp/before_files.txt) \
                <(find "$FOLDER" -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" \) | sort) \
                | head -1)

              if [ -n "$NEW_FILE" ] && [ -f "$NEW_FILE" ]; then
                echo "Download succeeded: $NEW_FILE"
                SUCCESS=true
                break
              fi
            fi

            echo "Attempt $i failed (exit=$EXIT_CODE)"
            [ $i -lt $MAX_RETRIES ] && sleep $((10 * i))
          done

          if [ "$SUCCESS" = false ]; then
            echo "::error::All $MAX_RETRIES download attempts failed"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "filepath=$NEW_FILE" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"- name: Split if file > 99 MB
        id: split
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > 99" | bc -l) )); then
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"
            rm "$FILENAME"

            echo "split_done=true" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "split_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          SPLIT_DONE="${{ steps.split.outputs.split_done }}"
          TAG="video-$(date +'%Y%m%d-%H%M%S')"

          gh release create "$TAG" \
            --title "Video Download - $(date +'%Y-%m-%d %H:%M:%S')" \
            --notes "Downloaded from: ${{ github.event.inputs.url }}"

          if [ "$SPLIT_DONE" = "true" ]; then
            ARCHIVE_NAME="${{ steps.split.outputs.archive_name }}"
            for f in "$FOLDER/${ARCHIVE_NAME}"*.rar; do
              gh release upload "$TAG" "$f"
            done
          elseFILEPATH="${{ steps.download.outputs.filepath }}"
            gh release upload "$TAG" "$FILEPATH"
          fi
