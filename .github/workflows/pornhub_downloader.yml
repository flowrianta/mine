name: p

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp and dependencies
        run: |
          pip install -U yt-dlp
          sudo apt-get update
          sudo apt-get install -y bc rar

      - name: Download video (retry up to 5 times)
        id: download
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          NEW_FILE=""

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "::group::Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES"

            # استفاده از --print برای گرفتن مسیر دقیق فایل خروجی
            OUTPUT=$(yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 10 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --newline \
              --print after_move:filepath \
              "${{ github.event.inputs.url }}" 2>&1 | tee /dev/stderr | grep -v '^\[' | tail -1)

            EXIT_CODE=${PIPESTATUS[0]}

            echo "::endgroup::"

            if [ $EXIT_CODE -eq 0 ] && [ -n "$OUTPUT" ] && [ -f "$OUTPUT" ]; then
              NEW_FILE="$OUTPUT"
              echo "Download succeeded: $NEW_FILE"
              SUCCESS=true
              break
            fi

            # Fallback: شاید --print کار نکرده، فایل جدید رو با find پیدا کن
            if [ $EXIT_CODE -eq 0 ]; then
              FOUND=$(find "$FOLDER" -type f \( -name "*.mp4" -o -name "*.mkv" -o -name "*.webm" \) -mmin -2 -print -quit)
              if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
                NEW_FILE="$FOUND"
                echo "Download succeeded (fallback detection): $NEW_FILE"
                SUCCESS=true
                break
              fi
            fi

            echo "Attempt $((RETRY_COUNT+1)) failed (exit=$EXIT_CODE)"
            RETRY_COUNT=$((RETRY_COUNT+1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              WAIT=$((10 * RETRY_COUNT))
              echo "Waiting ${WAIT}s before retry..."
              sleep $WAIT
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "::error::All $MAX_RETRIES download attempts failed"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")

          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "filepath=$NEW_FILE" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Conditional split (if file > 99 MB)
        id: split
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=99

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) )); then
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"

            rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"
            rm "$FILENAME"

            echo "split_done=true" >> "$GITHUB_OUTPUT"
            echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
            ls -lh "${ARCHIVE_NAME}"*.rar
          else
            echo "split_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to repository
        shell: bash
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$FOLDER/"

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add downloaded video(s)"

          # جلوگیری از race condition با pull --rebase قبل از push
          MAX_PUSH_RETRIES=3
          for i in $(seq 1 $MAX_PUSH_RETRIES); do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
