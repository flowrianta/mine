name: Download Video With Cookies

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Video page URL"
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y ffmpeg
        pip install yt-dlp

    - name: Restore cookies.txt
      run: |
        echo "${{ secrets.COOKIES }}" > cookies.txt

    - name: Create video folder
      run: mkdir -p video

    - name: Download with yt-dlp + cookies
      run: |
        URL="${{ github.event.inputs.url }}"

        yt-dlp \
          --cookies cookies.txt \
          --user-agent "Mozilla/5.0" \
          --referer "$URL" \
          --retries 10 \
          --fragment-retries 10 \
          --merge-output-format mp4 \
          -o "video/%(title)s.%(ext)s" \
          "$URL"

    - name: Split large files
      run: |
        cd video

        FILE=$(ls | head -n 1)
        SIZE=$(stat -c%s "$FILE")

        if [ "$SIZE" -gt 95000000 ]; then
          split -b 90M "$FILE" "$FILE.part."
          rm "$FILE"
        fi

    - name: Commit and push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add video/*
        git commit -m "Add downloaded video" || echo "Nothing to commit"

        git push
